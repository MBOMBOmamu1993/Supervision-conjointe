# Workflow TEMPORAIRE de diagnostic : liste les champs d'identification des
# soumissions des formulaires Contrôle qualité (CS et ZS) pour déboguer le
# matching géographique. À supprimer après diagnostic.
name: debug-kobo
on:
  push:
    branches: [claude/hopeful-feynman-kou2hi]
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump CQD identification fields
        run: |
          TOKEN=$(grep '^KOBO_TOKEN=' .env.example | cut -d= -f2)
          for ASSET in aaQZRLWXQ6rpTWr3uR3SEU ajhW22rQEkVs39SuhBuwCC; do
            echo "===================== ASSET $ASSET ====================="
            curl -s -H "Authorization: Token $TOKEN" \
              "https://eu.kobotoolbox.org/api/v2/assets/$ASSET/data.json?limit=300" \
            | python3 -c '
          import json,sys
          d=json.load(sys.stdin)
          print("count:", d.get("count"))
          for r in d.get("results", []):
              keep={}
              for k,v in r.items():
                  lk=k.lower()
                  if any(s in lk for s in ("province","antenne","zone","aire","ess","date_supervision","_submission_time","mois_a_verifier")) and not isinstance(v,(list,dict)):
                      keep[k]=v
              print(json.dumps(keep, ensure_ascii=False))
          '
          done
