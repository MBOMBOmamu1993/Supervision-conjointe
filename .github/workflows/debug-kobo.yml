# Workflow TEMPORAIRE de diagnostic : structure complète des soumissions du
# formulaire Contrôle qualité ZS (par-aire ?). À supprimer après diagnostic.
name: debug-kobo
on:
  push:
    branches: [claude/hopeful-feynman-kou2hi]
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump CQD ZS full structure
        run: |
          TOKEN=$(grep '^KOBO_TOKEN=' .env.example | cut -d= -f2)
          curl -s -H "Authorization: Token $TOKEN" \
            "https://eu.kobotoolbox.org/api/v2/assets/ajhW22rQEkVs39SuhBuwCC/data.json?limit=300" \
          | python3 -c '
          import json,sys
          d=json.load(sys.stdin)
          for r in d.get("results", []):
              zs = r.get("zone_sante")
              print("=========", zs, "=========")
              if zs != "boende":
                  print("keys:", sorted(k for k in r.keys() if not k.startswith("_")))
                  continue
              for k in sorted(r.keys()):
                  if k.startswith(("_attachments","_geolocation","formhub","meta")): continue
                  v = r[k]
                  if isinstance(v, list):
                      print(k, "= LIST[%d]" % len(v))
                      for item in v[:6]:
                          print("   ", json.dumps(item, ensure_ascii=False)[:1500])
                  else:
                      print(k, "=", json.dumps(v, ensure_ascii=False)[:300])
          '
